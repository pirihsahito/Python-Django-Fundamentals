<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing Your Text</title>
</head>
<body>
       <h2>Your Analyzed Text - {{ purpose }}</h2>
        <p>
        <pre><h4>{{ analyzed_text}}</h4></pre>
        </p>
        {% if character_count is not None %}
        <p>Total Characters (Excluding Spaces): {{ character_count }}</p>
        {% endif %}
</body>
</html>
