<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextUtils - Simple & Powerful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Colors */
        .bg-custom-dark { background-color: #2c3e50 !important; } /* Deep Slate Gray Navbar */
        .text-custom-teal { color: #1abc9c !important; } /* Clean Teal Brand Accent */
        .btn-custom { background-color: #1abc9c; color: white; border: none; }
        .btn-custom:hover { background-color: #16a085; color: white; }
        
        /* Matching the image structure */
        .alert-custom { background-color: #d1f2eb; color: #116f5c; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">TextUtils.in</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="#">About Us</a>
                <a class="nav-link" href="#">Contact Us</a>
            </div>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="alert alert-custom rounded-0 px-4 py-2 small" role="alert">
        <strong>Welcome to TextUtils!</strong> You can do anything with your text here!
    </div>

    <div class="container mt-4">
        <p class="text-secondary mb-3">Enter your text here and let Text Utils do the magic</p>
        
        <form action="/analyze/" method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <textarea name="text" class="form-control border-secondary-subtle shadow-sm" rows="8" style="max-width: 700px;" spellcheck="false" required></textarea>
            </div>

            <div class="mb-3 ps-1">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="removepunc" id="removepunc" value="on">
                    <label class="form-check-label" for="removepunc">Remove Punctuations</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="allcaps" id="allcaps" value="on">
                    <label class="form-check-label" for="allcaps">UPPERCASE</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="newlineremover" id="newlineremover" value="on">
                    <label class="form-check-label" for="newlineremover">New Line Remover</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="extraspaceremover" id="extraspaceremover" value="on">
                    <label class="form-check-label" for="extraspaceremover">Extra Spaces Remover</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="charcounter" id="charcounter" value="on">
                    <label class="form-check-label" for="charcounter">Characters Counter</label>
                </div>
            </div>

            <button type="submit" class="btn btn-custom px-4 py-2 fw-semibold shadow-sm">Analyze Text</button>
        </form>
    </div>

</body>
</html>
